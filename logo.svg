<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- 主渐变：活力蓝 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- 手臂渐变 -->
    <linearGradient id="armGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 白色圆角背景 -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="#ffffff" filter="url(#shadow)"/>

  <!-- 浏览器窗口外框 -->
  <rect x="24" y="28" width="80" height="72" rx="12" fill="url(#mainGrad)" opacity="0.1"/>
  <rect x="24" y="28" width="80" height="72" rx="12" fill="none" stroke="url(#mainGrad)" stroke-width="3"/>

  <!-- 窗口标题栏 -->
  <rect x="24" y="28" width="80" height="20" rx="12" fill="url(#mainGrad)"/>
  <rect x="24" y="40" width="80" height="8" fill="url(#mainGrad)"/>

  <!-- 三个圆点 -->
  <circle cx="36" cy="38" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="48" cy="38" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="60" cy="38" r="3" fill="#ffffff" opacity="0.4"/>

  <!-- 机械手臂/自动化抓手 -->
  <!-- 上臂 -->
  <rect x="76" y="52" width="8" height="24" rx="4" fill="url(#armGrad)" transform="rotate(-30 80 64)"/>
  <!-- 前臂 -->
  <rect x="84" y="64" width="8" height="20" rx="4" fill="url(#armGrad)" transform="rotate(15 88 74)"/>
  <!-- 抓手 -->
  <path d="M90 82 L94 90 L88 90 Z" fill="#1e40af"/>
  <circle cx="91" cy="88" r="5" fill="#f59e0b"/>

  <!-- 点击/交互波纹效果 -->
  <circle cx="72" cy="88" r="8" fill="#f59e0b" opacity="0.3"/>
  <circle cx="72" cy="88" r="5" fill="#f59e0b"/>

  <!-- 自动化连接线 -->
  <path d="M32 88 L44 88" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  <path d="M52 88 L64 88" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
</svg>
