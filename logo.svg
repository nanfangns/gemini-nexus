<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="robot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
  </defs>

  <!-- 白色背景 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#ffffff"/>

  <!-- 浏览器窗口 -->
  <rect x="20" y="24" width="88" height="80" rx="10" fill="none" stroke="url(#bg)" stroke-width="4"/>

  <!-- 标题栏 -->
  <rect x="20" y="24" width="88" height="18" rx="10" fill="url(#bg)"/>
  <rect x="20" y="34" width="88" height="8" fill="url(#bg)"/>

  <!-- 三个点 -->
  <circle cx="32" cy="33" r="3" fill="#ff6b6b"/>
  <circle cx="44" cy="33" r="3" fill="#feca57"/>
  <circle cx="56" cy="33" r="3" fill="#1dd1a1"/>

  <!-- 机器人/手臂简化版 -->
  <!-- 身体 -->
  <rect x="72" y="50" width="24" height="32" rx="6" fill="url(#robot)"/>
  <!-- 头 -->
  <rect x="76" y="42" width="16" height="12" rx="4" fill="url(#robot)"/>
  <!-- 眼睛 -->
  <circle cx="80" cy="48" r="2" fill="#fff"/>
  <circle cx="88" cy="48" r="2" fill="#fff"/>
  <!-- 手臂 -->
  <rect x="60" y="58" width="16" height="6" rx="3" fill="#764ba2"/>
  <!-- 手指向页面 -->
  <circle cx="58" cy="61" r="4" fill="#f5576c"/>

  <!-- 页面元素 -->
  <rect x="32" y="56" width="20" height="4" rx="2" fill="#667eea" opacity="0.6"/>
  <rect x="32" y="64" width="28" height="4" rx="2" fill="#764ba2" opacity="0.6"/>
  <rect x="32" y="72" width="24" height="4" rx="2" fill="#667eea" opacity="0.6"/>
</svg>
